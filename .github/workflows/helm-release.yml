name: Release Helm Chart

on:
  release:
    types: [published] # 当你发布一个新的 GitHub Release 时触发

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须有写权限才能推送到 Packages

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0 # 指定 Helm 版本

      - name: Login to GitHub Container Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm Chart
        run: |
          # 打包 Chart，生成 .tgz 文件
          helm package deploy/helm/ghcr-test

      - name: Push Chart to GHCR
        run: |
          # 推送 Chart 到 GitHub Packages
          # 格式：oci://ghcr.io/你的用户名/你的仓库名
          helm push *.tgz oci://ghcr.io/${{ github.repository_owner }}
